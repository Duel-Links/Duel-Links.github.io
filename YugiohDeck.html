<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duel-Links</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎴</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            color: #333;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        .app-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            flex: 1;
            height: 100%;
        }

        @media (max-width: 1000px) {
            .app-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            .search-section {
                width: 100% !important;
                max-width: 100% !important;
            }
            .container {
                width: 100%;
                max-width: 100%;
                padding: 10px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
                overflow-x: hidden;
            }
            .container {
                height: calc(100vh - 20px);
            }

            /* 卡片尺寸缩小，适应一行四张 */
            .card-item {
                height: 100px !important;
                width: auto !important;
            }

            /* 主卡组和额外卡组均固定4列 */
            .main-deck-grid {
                grid-template-columns: repeat(4, 1fr) !important;
            }
            .extra-deck-grid {
                grid-template-columns: repeat(4, 1fr) !important;
            }

            /* 搜索区域输入框和按钮字体缩小 */
            .search-box input {
                padding: 8px !important;
                font-size: 0.9rem !important;
            }
            .search-box button {
                padding: 0 15px !important;
                font-size: 0.9rem !important;
            }

            /* 搜索结果卡片预览调整 */
            .result-item img {
                width: 50px !important;
                height: 70px !important;
            }
            .result-name {
                font-size: 0.9rem !important;
            }
            .result-type {
                font-size: 0.75rem !important;
            }
            .result-desc {
                font-size: 0.7rem !important;
                max-height: 40px !important;
            }

            /* 卡片详情模态框等保持原布局 */
            .modal-content,
            .add-card-content,
            .deck-list-content,
            .share-content,
            .save-deck-content {
                width: 95% !important;
                max-width: 95% !important;
            }
            .card-detail {
                flex-direction: row !important;
                max-height: 90vh;
                flex-wrap: wrap;
            }
            .card-image {
                min-width: 40% !important;
                max-width: 40% !important;
                max-height: 350px !important;
            }
            .card-info {
                width: 55%;
                max-height: 60vh;
                overflow-y: auto;
            }
            .add-card-container {
                flex-direction: row !important;
                flex-wrap: wrap;
            }
            .add-card-preview {
                min-width: 40% !important;
                max-width: 40% !important;
                max-height: 350px !important;
            }
            .add-card-info {
                min-width: 55%;
                max-height: 45vh;
                overflow-y: auto;
            }

            /* 模态框底部适配 */
            .deck-list-modal,
            .share-modal,
            .save-deck-modal {
                align-items: flex-end;
            }
            .deck-list-content,
            .share-content,
            .save-deck-content {
                width: 100%;
                max-width: 100%;
                border-radius: 12px 12px 0 0;
                padding-bottom: 30px;
            }

            /* 搜索结果区域最大高度限制，防止挤压卡组区 */
            .results-container {
                max-height: 300px !important;
                overflow-y: auto;
            }

            /* 技能栏允许换行 */
            .deck-skill-section {
                flex-wrap: wrap;
            }
            .skill-selector {
                flex-wrap: wrap;
                width: 100%;
            }
            .skill-selector input {
                width: 100%;
                margin-right: 0;
                margin-bottom: 8px;
            }
            .deck-counts {
                width: 100%;
                justify-content: flex-start;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            .card-item {
                height: 85px !important;
            }
            .card-image,
            .add-card-preview {
                min-width: 100% !important;
                max-width: 100% !important;
            }
            .card-info,
            .add-card-info {
                width: 100% !important;
                min-width: 100% !important;
                max-height: 45vh;
                overflow-y: auto;
            }
        }

        /* 原有样式保持不变（略作精简） */
        .card-detail {
            display: flex;
            padding: 20px;
            gap: 20px;
            max-height: 90vh;
            overflow: auto;
        }

        .search-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 400px;
        }

        .search-box {
            display: flex;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px 0 0 8px;
            background: #f8fafc;
            color: #333;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #4da6ff;
            box-shadow: 0 0 10px rgba(77, 166, 255, 0.2);
        }

        .search-box button {
            padding: 0 20px;
            background: #4da6ff;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box button:hover {
            background: #3182ce;
        }

        .search-results {
            flex: 1;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            display: flex;
            flex-direction: column;
            height: calc(100% - 60px);
        }

        .results-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #edf2f7;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 6px;
            margin-bottom: 5px;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item:hover {
            background: rgba(77, 166, 255, 0.05);
        }

        .result-item img {
            width: 70px;
            height: 100px;
            object-fit: contain;
            border-radius: 5px;
            margin-right: 12px;
            border: 1px solid #e2e8f0;
            background: #f7fafc;
        }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-name {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #2d3748;
        }

        .result-type {
            font-size: 0.85rem;
            color: #718096;
        }

        .result-desc {
            font-size: 0.8rem;
            color: #4a5568;
            margin-top: 6px;
            max-height: 50px;
            overflow-y: auto;
            line-height: 1.4;
            padding-right: 5px;
        }

        .deck-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
        }

        .deck-skill-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(77, 166, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .skill-selector {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .skill-selector input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            background: #f7fafc;
            color: #333;
            font-size: 0.9rem;
            margin-right: 15px;
        }

        .deck-counts {
            display: flex;
            gap: 15px;
            font-size: 0.95rem;
            align-items: center;
        }

        .deck-count {
            background: rgba(77, 166, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #2d3748;
        }

        .count-value {
            color: #3182ce;
            font-weight: bold;
        }

        .deck-container {
            margin-bottom: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .deck-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #3182ce;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .deck-title i {
            margin-right: 8px;
        }

        .deck-grid {
            display: grid;
            gap: 10px;
            min-height: 120px;
            background: #f7fafc;
            border-radius: 8px;
            padding: 10px;
            border: 1px dashed #cbd5e0;
            flex: 1;
            overflow-y: auto;
            height: 100%;
        }

        .main-deck-grid {
            grid-template-columns: repeat(4, 1fr);
        }

        @media (max-width: 1200px) {
            .main-deck-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .main-deck-grid.medium {
            grid-template-columns: repeat(5, 1fr);
        }

        .main-deck-grid.large {
            grid-template-columns: repeat(6, 1fr);
        }

        .extra-deck-grid {
            grid-template-columns: repeat(4, 1fr);
            min-height: 180px;
            height: auto;
        }

        @media (max-width: 1200px) {
            .extra-deck-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .card-item {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
            height: 150px;
            width: 100px;
            background: white;
        }

        .card-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 12px rgba(77, 166, 255, 0.15);
        }

        .card-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .card-count {
            position: absolute;
            top: 1px;
            right: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #3182ce;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 2;
            border: 1px solid #e2e8f0;
        }

        .card-controls {
            position: absolute;
            bottom: 4px;
            right: 4px;
            display: flex;
            gap: 4px;
            z-index: 2;
        }

        .card-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
            color: white;
            font-size: 0.9rem;
        }

        .card-increase {
            background: #48bb78;
        }

        .card-decrease {
            background: #e53e3e;
        }

        .card-btn:hover {
            transform: scale(1.15);
        }

        .deck-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: auto;
        }

        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.08);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .save-btn {
            background: #38a169;
            color: white;
        }

        .load-btn {
            background: #3182ce;
            color: white;
        }

        .share-btn {
            background: #805ad5;
            color: white;
        }

        .reset-btn {
            background: #e53e3e;
            color: white;
        }

        .card-placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 130px;
            background: #f7fafc;
            border-radius: 6px;
            border: 1px dashed #cbd5e0;
            color: #a0aec0;
            font-size: 0.85rem;
            text-align: center;
            padding: 10px;
            grid-column: 1 / -1;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 15px;
        }

        .loader .spinner {
            border: 3px solid rgba(77, 166, 255, 0.2);
            border-radius: 50%;
            border-top: 3px solid #3182ce;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 700px;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.15);
            position: relative;
            width: 90%;
        }

        .close-modal {
            position: absolute;
            top: 12px;
            right: 15px;
            font-size: 1.8rem;
            color: #718096;
            cursor: pointer;
            z-index: 10;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: #3182ce;
        }

        .card-image {
            flex: 1;
            min-width: 250px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
        }

        .card-image img {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
        }

        .card-info {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-name {
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: #3182ce;
        }

        .card-type {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .card-desc {
            line-height: 1.6;
            font-size: 1rem;
            color: #4a5568;
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f7fafc;
            border-radius: 6px;
            max-height: 250px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            background: #38a169;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transform: translateX(200%);
            transition: transform 0.4s ease-out;
            z-index: 2000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: #e53e3e;
        }

        .notification.warning {
            background: #dd6b20;
        }

        .add-card-modal,
        .deck-list-modal,
        .share-modal,
        .save-deck-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .add-card-content,
        .deck-list-content,
        .share-content,
        .save-deck-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            max-width: 90vh;
            width: 90%;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.15);
        }

        .add-card-container {
            display: flex;
            gap: 20px;
            padding: 15px;
            max-height: 90vh;
        }

        .add-card-preview {
            flex: 1;
            min-width: 150px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
        }

        .add-card-preview img {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
        }

        .add-card-info {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .add-card-name {
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: #3182ce;
        }

        .add-card-type {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .add-card-desc {
            line-height: 1.6;
            font-size: 1rem;
            color: #4a5568;
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f7fafc;
            border-radius: 6px;
            max-height: 200px;
            margin-bottom: 5px;
        }

        .quantity-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 5px 0 10px;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #f7fafc;
            color: #4a5568;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #cbd5e0;
        }

        .quantity-btn.active {
            background: #3182ce;
            color: white;
        }

        .add-card-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .add-card-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .confirm-add {
            background: #38a169;
            color: white;
        }

        .cancel-add {
            background: #e53e3e;
            color: white;
        }

        .deck-list-items {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .deck-item {
            background: #f7fafc;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #3182ce;
        }

        .deck-item-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 6px;
            color: #3182ce;
        }

        .deck-item-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .deck-action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary {
            background: #3182ce;
            color: white;
        }

        .btn-success {
            background: #38a169;
            color: white;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .share-content {
            max-width: 500px;
        }

        .share-options {
            margin-top: 10px;
        }

        .share-option {
            margin-bottom: 20px;
        }

        .option-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #3182ce;
            margin-bottom: 8px;
        }

        .share-code {
            background: #f7fafc;
            padding: 12px;
            border-radius: 6px;
            word-break: break-all;
            font-family: monospace;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            color: #4a5568;
            text-align: left;
            white-space: pre-wrap;
            margin-top: 10px;
        }

        .share-buttons {
            display: flex;
            gap: 12px;
            padding: 12px;
            justify-content: center;
        }

        .share-btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .copy-btn {
            background: #3182ce;
            color: white;
        }

        .download-btn {
            background: #38a169;
            color: white;
        }

        .close-share-btn {
            background: #e53e3e;
            color: white;
        }

        /* 截图预览模态框（全屏） */
        .screenshot-preview-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .screenshot-preview-modal img {
            max-width: 95%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            background: white;
        }

        .close-screenshot-btn {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: #e74c3c;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .close-screenshot-btn:hover {
            background: #c0392b;
        }

        /* 加载提示 */
        .share-loading {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .share-loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        .share-loading-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .load-by-code-section {
            margin-bottom: 20px;
        }

        .load-by-code-section textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            background: #f7fafc;
            margin-bottom: 10px;
            resize: vertical;
        }

        .save-deck-content {
            max-width: 400px;
        }

        .save-input {
            margin: 15px 0;
        }

        .save-input input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            background: #f8fafc;
            color: #333;
            font-size: 1rem;
        }

        .save-input input:focus {
            outline: none;
            border-color: #4da6ff;
            box-shadow: 0 0 10px rgba(77, 166, 255, 0.2);
        }

        .save-actions {
            display: flex;
            gap: 12px;
        }

        .save-actions button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-container">
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="card-search" placeholder="输入卡片名称搜索...">
                    <button id="search-btn"><i class="fas fa-search"></i> 搜索</button>
                </div>
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <p>正在搜索卡片...</p>
                </div>
                <div class="search-results" id="search-results">
                    <div class="results-container" id="results-container">
                        <div class="result-item placeholder">
                            <div class="result-info">
                                <div class="result-name">输入卡片名称开始搜索</div>
                                <div class="result-type">例如：青眼白龙、黑魔术师、死者苏生</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="deck-section" id="deck-section">
                <div class="deck-skill-section">
                    <div class="skill-selector">
                        <input type="text" class="skill-input" id="deck-skill" placeholder="输入卡组技能...">
                        <div class="deck-counts">
                            <div class="deck-count">
                                <i class="fas fa-layer-group"></i> MN: <span id="main-count">0</span>/30
                            </div>
                            <div class="deck-count">
                                <i class="fas fa-star"></i> EX: <span id="extra-count">0</span>/8
                            </div>
                        </div>
                    </div>
                </div>
                <div class="deck-container">
                    <h3 class="deck-title"><i class="fas fa-layer-group"></i> 主卡组</h3>
                    <div class="deck-grid main-deck-grid" id="main-deck">
                        <div class="card-placeholder">添加主卡组卡片 (20-30张)</div>
                    </div>
                </div>
                <div class="deck-container">
                    <h3 class="deck-title"><i class="fas fa-star"></i> 额外卡组</h3>
                    <div class="deck-grid extra-deck-grid" id="extra-deck">
                        <div class="card-placeholder">添加额外卡组卡片 (最多8张)</div>
                    </div>
                </div>
                <div class="deck-actions">
                    <button class="action-btn save-btn" id="save-btn">
                        <i class="fas fa-save"></i> 保存
                    </button>
                    <button class="action-btn load-btn" id="load-btn">
                        <i class="fas fa-folder-open"></i> 加载
                    </button>
                    <button class="action-btn share-btn" id="share-btn">
                        <i class="fas fa-share-alt"></i> 分享
                    </button>
                    <button class="action-btn reset-btn" id="reset-btn">
                        <i class="fas fa-trash-alt"></i> 重置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 卡片详情模态框 -->
    <div class="modal" id="card-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <div class="card-detail">
                <div class="card-image">
                    <img src="" alt="卡片大图" id="detail-image">
                </div>
                <div class="card-info">
                    <h2 class="card-name" id="detail-name">卡片名称</h2>
                    <div class="card-type" id="detail-type">卡片类型</div>
                    <div class="card-desc" id="detail-desc">卡片效果描述将显示在这里...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加卡片模态框 -->
    <div class="add-card-modal" id="add-card-modal">
        <div class="add-card-content">
            <div class="add-card-container">
                <div class="add-card-preview">
                    <img src="" alt="卡片预览" id="add-card-image">
                </div>
                <div class="add-card-info">
                    <div class="add-card-name" id="add-card-name">卡片名称</div>
                    <div class="add-card-type" id="add-card-type">卡片类型</div>
                    <div class="add-card-desc" id="add-card-desc">卡片描述</div>
                    <div class="quantity-selector-container">
                        <div class="quantity-selector">
                            <button class="quantity-btn" data-quantity="1">1</button>
                            <button class="quantity-btn" data-quantity="2">2</button>
                            <button class="quantity-btn" data-quantity="3">3</button>
                        </div>
                    </div>
                    <div class="add-card-actions">
                        <button class="add-card-btn confirm-add" id="confirm-add">添加</button>
                        <button class="add-card-btn cancel-add" id="cancel-add">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 卡组列表模态框 -->
    <div class="deck-list-modal" id="deck-list-modal">
        <div class="deck-list-content">
            <div class="load-by-code-section">
                <textarea id="deck-code-input" placeholder="在此粘贴卡组代码..."></textarea>
                <button id="load-by-code-btn" class="btn btn-primary">
                    <i class="fas fa-code"></i> 通过代码加载卡组
                </button>
            </div>
            <div class="deck-list-items" id="deck-list-items"></div>
            <button class="btn btn-primary" id="close-deck-list">
                <i class="fas fa-times"></i> 关闭
            </button>
        </div>
    </div>

    <!-- 分享卡组模态框 -->
    <div class="share-modal" id="share-modal">
        <div class="share-content">
            <div class="share-options">
                <div class="share-option">
                    <div class="option-title">
                        <i class="fas fa-code"></i> 卡组代码
                    </div>
                    <div class="share-code" id="deck-code">生成中...</div>
                    <div class="share-buttons">
                        <button class="share-btn-action copy-btn" id="copy-code-btn">
                            <i class="fas fa-copy"></i> 复制代码
                        </button>
                    </div>
                </div>
                <div class="share-option">
                    <div class="option-title">
                        <i class="fas fa-camera"></i> 卡组截图
                    </div>
                    <div class="share-buttons">
                        <button class="share-btn-action download-btn" id="generate-screenshot-btn">
                            <i class="fas fa-camera"></i> 生成截图
                        </button>
                    </div>
                </div>
            </div>
            <div class="share-buttons">
                <button class="share-btn-action close-share-btn" id="close-share-btn">
                    <i class="fas fa-times"></i> 关闭
                </button>
            </div>
        </div>
    </div>

    <!-- 截图预览模态框 -->
    <div class="screenshot-preview-modal" id="screenshot-preview-modal">
        <img id="screenshot-preview-image" alt="卡组截图" />
        <button class="close-screenshot-btn" id="close-screenshot-btn">
            <i class="fas fa-times"></i> 关闭
        </button>
    </div>

    <!-- 生成截图时的加载提示 -->
    <div class="share-loading" id="share-loading">
        <div class="share-loading-spinner"></div>
        <div class="share-loading-text">正在生成卡组截图，请稍候…</div>
    </div>

    <!-- 保存卡组模态框 -->
    <div class="save-deck-modal" id="save-deck-modal">
        <div class="save-deck-content">
            <h2><i class="fas fa-save"></i> 保存卡组</h2>
            <div class="save-input">
                <input type="text" id="deck-name-input" placeholder="输入卡组名称">
            </div>
            <div class="save-actions">
                <button class="btn btn-success" id="save-deck-confirm">保存</button>
                <button class="btn btn-danger" id="save-deck-cancel">取消</button>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div class="notification" id="notification">操作成功！</div>

    <script>
        (function() {
            let deck = { main: [], extra: [], skill: "" };
            let searchState = { currentPage: 1, pageSize: 30, totalResults: 0, currentSearchTerm: '' };
            let currentSelectedCard = null;
            let selectedQuantity = 1;

            const mainDeckEl = document.getElementById('main-deck');
            const extraDeckEl = document.getElementById('extra-deck');
            const mainCountEl = document.getElementById('main-count');
            const extraCountEl = document.getElementById('extra-count');
            const cardModal = document.getElementById('card-modal');
            const closeModal = document.getElementById('close-modal');
            const notification = document.getElementById('notification');
            const resultsContainer = document.getElementById('results-container');
            const loaderEl = document.getElementById('loader');
            const addCardModal = document.getElementById('add-card-modal');
            const deckListModal = document.getElementById('deck-list-modal');
            const shareModal = document.getElementById('share-modal');
            const saveDeckModal = document.getElementById('save-deck-modal');
            const deckSkillInput = document.getElementById('deck-skill');
            const deckSection = document.getElementById('deck-section');
            const screenshotPreviewModal = document.getElementById('screenshot-preview-modal');
            const screenshotPreviewImage = document.getElementById('screenshot-preview-image');
            const shareLoading = document.getElementById('share-loading');
            const generateScreenshotBtn = document.getElementById('generate-screenshot-btn');

            deckSkillInput.addEventListener('change', () => { deck.skill = deckSkillInput.value; });
            document.getElementById('search-btn').addEventListener('click', searchCards);
            document.getElementById('card-search').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchCards(); });

            function searchCards() {
                const searchTerm = document.getElementById('card-search').value.trim();
                if (!searchTerm) { showNotification('请输入卡片名称', true); return; }
                searchState.currentSearchTerm = searchTerm;
                loaderEl.style.display = 'block';
                resultsContainer.innerHTML = '';
                fetch(`https://ygocdb.com/api/v0/?search=${encodeURIComponent(searchTerm)}&limit=${searchState.pageSize}`)
                    .then(r => r.json())
                    .then(data => {
                        loaderEl.style.display = 'none';
                        if (data.result?.length) {
                            searchState.totalResults = data.total;
                            displaySearchResults(data.result);
                        } else {
                            resultsContainer.innerHTML = '<div class="result-item"><div class="result-info"><div class="result-name">未找到相关卡片</div><div class="result-type">请尝试其他关键词</div></div></div>';
                        }
                    })
                    .catch(err => {
                        loaderEl.style.display = 'none';
                        resultsContainer.innerHTML = '<div class="result-item"><div class="result-info"><div class="result-name">API调用失败</div><div class="result-type">请稍后重试</div></div></div>';
                        showNotification('API调用失败', true);
                    });
            }

            function displaySearchResults(cards) {
                resultsContainer.innerHTML = '';
                cards.forEach(card => {
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    const cardType = card.text?.types || card.type || '';
                    const cardDesc = card.text?.desc || card.desc || '';
                    item.innerHTML = `
                        <img src="https://cdn.233.momobako.com/ygopro/pics/${card.id}.jpg" alt="${card.cn_name || card.name}">
                        <div class="result-info">
                            <div class="result-name">${card.cn_name || card.name}</div>
                            <div class="result-type">${cardType}</div>
                            <div class="result-desc">${cardDesc}</div>
                        </div>`;
                    item.addEventListener('click', () => showAddCardModal({
                        id: card.id,
                        name: card.cn_name || card.name,
                        type: cardType,
                        desc: cardDesc
                    }));
                    resultsContainer.appendChild(item);
                });
            }

            function showAddCardModal(card) {
                currentSelectedCard = card;
                selectedQuantity = 1;
                document.getElementById('add-card-image').src = `https://cdn.233.momobako.com/ygopro/pics/${card.id}.jpg`;
                document.getElementById('add-card-name').textContent = card.name;
                document.getElementById('add-card-type').textContent = card.type;
                document.getElementById('add-card-desc').textContent = card.desc;
                document.querySelectorAll('.quantity-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.quantity-btn[data-quantity="1"]').classList.add('active');
                addCardModal.style.display = 'flex';
            }

            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.quantity-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedQuantity = parseInt(this.dataset.quantity);
                });
            });

            document.getElementById('confirm-add').addEventListener('click', () => {
                if (currentSelectedCard) {
                    addCardToDeck(currentSelectedCard, selectedQuantity);
                    addCardModal.style.display = 'none';
                }
            });
            document.getElementById('cancel-add').addEventListener('click', () => addCardModal.style.display = 'none');

            function addCardToDeck(card, quantity) {
                const isExtra = card.type.includes('融合') || card.type.includes('同调') || card.type.includes('超量') || card.type.includes('连接');
                const target = isExtra ? deck.extra : deck.main;
                const deckName = isExtra ? '额外卡组' : '主卡组';
                const current = target.reduce((s, c) => s + c.count, 0);
                const max = isExtra ? 8 : 30;
                if (current + quantity > max) return showNotification(`${deckName}空间不足，只能添加${max - current}张`, true);
                const exist = target.find(c => c.id === card.id);
                if (exist) {
                    if (exist.count + quantity > 3) return showNotification(`"${card.name}"最多还能添加${3 - exist.count}张`, true);
                    exist.count += quantity;
                } else {
                    target.push({ ...card, count: quantity });
                }
                updateDeckDisplay();
                showNotification(`已添加${quantity}张"${card.name}"到${deckName}`);
            }

            function updateDeckDisplay() {
                mainDeckEl.innerHTML = '';
                extraDeckEl.innerHTML = '';
                const mainCnt = deck.main.reduce((s, c) => s + c.count, 0);
                const extraCnt = deck.extra.reduce((s, c) => s + c.count, 0);
                mainCountEl.textContent = mainCnt;
                extraCountEl.textContent = extraCnt;

                if (deck.main.length === 0) mainDeckEl.innerHTML = '<div class="card-placeholder">添加主卡组卡片 (20-30张)</div>';
                else deck.main.forEach(c => mainDeckEl.appendChild(createCardEl(c, 'main')));
                if (deck.extra.length === 0) extraDeckEl.innerHTML = '<div class="card-placeholder">添加额外卡组卡片 (最多8张)</div>';
                else deck.extra.forEach(c => extraDeckEl.appendChild(createCardEl(c, 'extra')));
            }

            function createCardEl(card, type) {
                const el = document.createElement('div');
                el.className = 'card-item';
                el.innerHTML = `
                    <img src="https://cdn.233.momobako.com/ygopro/pics/${card.id}.jpg" alt="${card.name}">
                    <div class="card-count">${card.count}</div>
                    <div class="card-controls">
                        <button class="card-btn card-increase">+</button>
                        <button class="card-btn card-decrease">-</button>
                    </div>`;
                el.querySelector('img').onclick = (e) => { e.stopPropagation(); showCardDetail(card); };
                el.querySelector('.card-increase').onclick = (e) => { e.stopPropagation(); increase(card.id, type); };
                el.querySelector('.card-decrease').onclick = (e) => { e.stopPropagation(); decrease(card.id, type); };
                return el;
            }

            function increase(id, type) {
                const arr = type === 'main' ? deck.main : deck.extra;
                const card = arr.find(c => c.id === id);
                if (!card) return;
                if (card.count >= 3) return showNotification('已达最大数量(3张)', true);
                const total = arr.reduce((s, c) => s + c.count, 0);
                const max = type === 'main' ? 30 : 8;
                if (total >= max) return showNotification(`${type === 'main' ? '主卡组' : '额外卡组'}已满`, true);
                card.count++;
                updateDeckDisplay();
            }

            function decrease(id, type) {
                const arr = type === 'main' ? deck.main : deck.extra;
                const idx = arr.findIndex(c => c.id === id);
                if (idx === -1) return;
                if (arr[idx].count > 1) arr[idx].count--;
                else arr.splice(idx, 1);
                updateDeckDisplay();
            }

            function showCardDetail(card) {
                document.getElementById('detail-image').src = `https://cdn.233.momobako.com/ygopro/pics/${card.id}.jpg`;
                document.getElementById('detail-name').textContent = card.name;
                document.getElementById('detail-type').textContent = card.type;
                document.getElementById('detail-desc').textContent = card.desc || '无描述';
                cardModal.style.display = 'flex';
            }

            function showNotification(msg, isErr = false) {
                notification.textContent = msg;
                notification.className = 'notification' + (isErr ? ' error' : '');
                notification.classList.add('show');
                setTimeout(() => notification.classList.remove('show'), 3000);
            }

            document.getElementById('save-btn').onclick = () => { document.getElementById('deck-name-input').value = ''; saveDeckModal.style.display = 'flex'; };
            document.getElementById('save-deck-confirm').onclick = () => {
                const name = document.getElementById('deck-name-input').value.trim();
                if (!name) return showNotification('请输入卡组名称', true);
                const data = { name, date: new Date().toISOString(), main: [...deck.main], extra: [...deck.extra], skill: deck.skill };
                let saved = JSON.parse(localStorage.getItem('ygoDecks') || '[]');
                if (saved.length >= 20) return showNotification('最多保存20个卡组', true);
                saved.push(data);
                localStorage.setItem('ygoDecks', JSON.stringify(saved));
                saveDeckModal.style.display = 'none';
                showNotification(`卡组"${name}"保存成功`);
            };
            document.getElementById('save-deck-cancel').onclick = () => saveDeckModal.style.display = 'none';

            document.getElementById('load-btn').onclick = () => showDeckListModal();
            document.getElementById('share-btn').onclick = () => {
                const mainCnt = deck.main.reduce((s, c) => s + c.count, 0);
                const extraCnt = deck.extra.reduce((s, c) => s + c.count, 0);
                if (mainCnt === 0 && extraCnt === 0) return showNotification('卡组为空', true);
                let code = `!${deck.skill || '无技能'}\n#main\n`;
                deck.main.forEach(c => code += `${c.name} ${c.count}\n`);
                if (deck.extra.length) { code += '#extra\n'; deck.extra.forEach(c => code += `${c.name} ${c.count}\n`); }
                document.getElementById('deck-code').textContent = code;
                shareModal.style.display = 'flex';
            };
            document.getElementById('copy-code-btn').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('deck-code').textContent)
                    .then(() => showNotification('代码已复制'))
                    .catch(() => showNotification('复制失败，请手动复制', true));
            };
            document.getElementById('close-share-btn').onclick = () => shareModal.style.display = 'none';

            generateScreenshotBtn.onclick = async function() {
                if (this.disabled) return;
                this.disabled = true;
                shareModal.style.display = 'none';
                shareLoading.style.display = 'flex';

                const clone = deckSection.cloneNode(true);
                clone.style.position = 'absolute';
                clone.style.left = '-9999px';
                clone.style.width = deckSection.offsetWidth + 'px';
                document.body.appendChild(clone);

                const imgs = clone.querySelectorAll('img');
                const proxy = url => `https://images.weserv.nl/?url=${encodeURIComponent(url)}`;
                await Promise.all([...imgs].map(img => new Promise(resolve => {
                    img.crossOrigin = 'anonymous';
                    img.src = proxy(img.src);
                    img.onload = resolve;
                    img.onerror = resolve;
                    setTimeout(resolve, 3000);
                })));

                try {
                    await new Promise(r => setTimeout(r, 200));
                    const canvas = await html2canvas(clone, {
                        scale: 2,
                        backgroundColor: '#ffffff',
                        useCORS: true,
                        allowTaint: false,
                        logging: false
                    });
                    screenshotPreviewImage.src = canvas.toDataURL('image/png');
                    screenshotPreviewModal.style.display = 'flex';
                } catch (e) {
                    showNotification('截图生成失败', true);
                } finally {
                    document.body.removeChild(clone);
                    shareLoading.style.display = 'none';
                    this.disabled = false;
                }
            };

            document.getElementById('close-screenshot-btn').onclick = () => screenshotPreviewModal.style.display = 'none';
            screenshotPreviewModal.onclick = function(e) { if (e.target === this) this.style.display = 'none'; };

            document.getElementById('reset-btn').onclick = () => {
                if (confirm('确定重置卡组？')) {
                    deck.main = []; deck.extra = []; deck.skill = '';
                    deckSkillInput.value = '';
                    updateDeckDisplay();
                    showNotification('卡组已重置');
                }
            };

            closeModal.onclick = () => cardModal.style.display = 'none';
            window.onclick = (e) => {
                if (e.target === cardModal) cardModal.style.display = 'none';
                if (e.target === addCardModal) addCardModal.style.display = 'none';
                if (e.target === deckListModal) deckListModal.style.display = 'none';
                if (e.target === shareModal) shareModal.style.display = 'none';
                if (e.target === saveDeckModal) saveDeckModal.style.display = 'none';
            };

            document.getElementById('close-deck-list').onclick = () => deckListModal.style.display = 'none';

            document.getElementById('load-by-code-btn').onclick = loadDeckByCode;
            function loadDeckByCode() {
                const text = document.getElementById('deck-code-input').value.trim();
                if (!text) return showNotification('请输入卡组代码', true);
                const lines = text.split('\n');
                const mainList = [], extraList = [];
                let skill = '', sec = 'main';
                lines.forEach(l => {
                    l = l.trim();
                    if (!l) return;
                    if (l.startsWith('!')) { skill = l.substring(1).trim(); return; }
                    if (l.toLowerCase() === '#main') { sec = 'main'; return; }
                    if (l.toLowerCase() === '#extra') { sec = 'extra'; return; }
                    const parts = l.split(' ');
                    const cnt = parseInt(parts.pop());
                    if (isNaN(cnt)) return;
                    const name = parts.join(' ').trim();
                    if (name && cnt > 0) (sec === 'main' ? mainList : extraList).push({ name, cnt });
                });
                deck.main = []; deck.extra = []; deck.skill = skill; deckSkillInput.value = skill;
                showNotification('正在加载卡组...');
                const load = (name, isExtra) => fetch(`https://ygocdb.com/api/v0/?search=${encodeURIComponent(name)}&limit=1`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.result?.length) {
                            const c = d.result[0];
                            addCardToDeck({ id: c.id, name: c.cn_name || c.name, type: c.text?.types || c.type || '', desc: c.text?.desc || '' }, 1);
                        }
                    }).catch(() => {});
                const all = [];
                mainList.forEach(c => { for (let i = 0; i < c.cnt; i++) all.push(load(c.name, false)); });
                extraList.forEach(c => { for (let i = 0; i < c.cnt; i++) all.push(load(c.name, true)); });
                Promise.all(all).then(() => {
                    updateDeckDisplay();
                    deckListModal.style.display = 'none';
                });
            }

            function showDeckListModal() {
                let saved = JSON.parse(localStorage.getItem('ygoDecks') || '[]');
                if (!saved.length) {
                    saved = [{
                        name: '默认青眼卡组', date: new Date().toISOString(),
                        skill: '战斗编年史',
                        main: [{ name: '青眼亚白龙', count: 2 }, { name: '白色灵龙', count: 3 }, { name: '最强混沌战士', count: 1 }, { name: '青眼白龙', count: 3 }, { name: '继承之魂', count: 2 }, { name: '究极融合', count: 1 }, { name: '龙觉醒旋律', count: 3 }, { name: '摇号机GO！GO！', count: 1 }, { name: '复活之福音', count: 2 }, { name: '王者的看破', count: 2 }],
                        extra: [{ name: '究极龙骑士', count: 1 }, { name: '真青眼究极龙', count: 1 }, { name: '青眼究极龙', count: 1 }, { name: '青眼双爆裂龙', count: 1 }, { name: '宵星之机神 丁吉尔苏', count: 1 }, { name: '银河眼光波龙', count: 1 }, { name: '银河眼重铠光子龙', count: 1 }, { name: '银河眼光波刃龙', count: 1 }]
                    }];
                    localStorage.setItem('ygoDecks', JSON.stringify(saved));
                }
                const list = document.getElementById('deck-list-items');
                list.innerHTML = saved.map((d, i) => `
                    <div class="deck-item">
                        <div class="deck-item-name">${d.name}</div>
                        <div>主卡组: ${d.main.reduce((s,c)=>s+c.count,0)} | 额外: ${d.extra.reduce((s,c)=>s+c.count,0)}</div>
                        <div>技能: ${d.skill || '无'}</div>
                        <div class="deck-item-actions">
                            <button class="deck-action-btn btn btn-primary" data-idx="${i}"><i class="fas fa-folder-open"></i>加载</button>
                            <button class="deck-action-btn btn btn-danger" data-idx="${i}"><i class="fas fa-trash-alt"></i>删除</button>
                        </div>
                    </div>`).join('');
                list.querySelectorAll('.btn-primary').forEach(b => b.onclick = () => {
                    loadDeck(saved[parseInt(b.dataset.idx)]);
                    deckListModal.style.display = 'none';
                });
                list.querySelectorAll('.btn-danger').forEach(b => b.onclick = () => {
                    if (confirm('确定删除？')) {
                        saved.splice(parseInt(b.dataset.idx), 1);
                        localStorage.setItem('ygoDecks', JSON.stringify(saved));
                        showDeckListModal();
                    }
                });
                deckListModal.style.display = 'flex';
            }

            function loadDeck(data) {
                deck.main = []; deck.extra = []; deck.skill = data.skill || ''; deckSkillInput.value = deck.skill;
                data.main.forEach(c => deck.main.push({ ...c, id: 0, type: '', desc: '' }));
                data.extra.forEach(c => deck.extra.push({ ...c, id: 0, type: '', desc: '' }));
                updateDeckDisplay();
                const fetchCard = (name, type) => fetch(`https://ygocdb.com/api/v0/?search=${encodeURIComponent(name)}&limit=1`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.result?.length) {
                            const c = d.result[0];
                            const arr = type === 'main' ? deck.main : deck.extra;
                            const card = arr.find(x => x.name === name);
                            if (card) { card.id = c.id; card.type = c.text?.types || c.type || ''; card.desc = c.text?.desc || ''; }
                        }
                    }).catch(() => {});
                data.main.forEach(c => fetchCard(c.name, 'main'));
                data.extra.forEach(c => fetchCard(c.name, 'extra'));
                setTimeout(updateDeckDisplay, 500);
            }

            window.addEventListener('DOMContentLoaded', () => {
                updateDeckDisplay();
            });
        })();
    </script>
</body>
</html>
